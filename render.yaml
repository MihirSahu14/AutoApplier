# Render blueprint — FREE TIER, ZERO SECRETS.
#
# No persistent disk → AJA_DATA_DIR = /tmp/aja-data (ephemeral; wiped on every
# restart or redeploy).  That's fine: the user's profile + API keys live in
# their browser's localStorage and are auto-pushed back to the server on cold
# starts.  Nothing personal ever lives on the server long-term.
#
# No API keys baked in either — every visitor enters their own Anthropic key
# in the /setup wizard.  Keys never touch git, never appear in env vars.
#
# Apply once: https://dashboard.render.com/blueprints

services:
  - type: web
    name: auto-job-applier-api
    runtime: python
    plan: free                     # spins down after 15 min idle, cold-starts on next hit
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn webapp:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: AJA_DATA_DIR
        value: /tmp/aja-data       # ephemeral — no paid disk
      - key: AJA_DISABLE_AUTOFILL
        value: "1"                 # remote server can't open browsers on your laptop
      - key: HOST
        value: 0.0.0.0
      # Set this to your Vercel URL after first frontend deploy.
      - key: FRONTEND_ORIGIN
        sync: false
