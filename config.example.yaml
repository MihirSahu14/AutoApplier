# Copy to config.yaml and set your preferred providers.
# Per-user data (contact, resume, targets, API keys) goes in data/profile.json
# which is edited via the web UI Settings page.

providers:
  scoring:
    provider: groq                   # FREE — change to 'anthropic' if you have credits
    model:    llama-3.1-8b-instant
  tailoring:
    provider: gemini                 # FREE — best quality for cover letters at $0
    model:    gemini-2.0-flash
  outreach:
    provider: groq
    model:    llama-3.3-70b-versatile

# Pricing only matters for provider=anthropic. Free providers ignore this.
pricing:
  claude-haiku-4-5-20251001: {input: 1.00, output: 5.00}
  claude-sonnet-4-5:         {input: 3.00, output: 15.00}

budget:
  daily_usd: 1.00
  stage_caps:
    scoring:   0.30
    tailoring: 0.50
    outreach:  0.20

scoring:
  threshold: 70

sources:
  hn_who_is_hiring:
    enabled: true
    months_back: 1
