# App-level config. Per-user data (contact info, resume, targets, API keys)
# is collected through the Settings UI on first launch.

scoring:
  model: claude-haiku-4-5-20251001
  threshold: 70

generation:
  model: claude-sonnet-4-5

pricing:
  claude-haiku-4-5-20251001: {input: 1.00, output: 5.00}
  claude-sonnet-4-5:         {input: 3.00, output: 15.00}

budget:
  daily_usd: 1.00
  stage_caps:
    scoring:   0.30
    tailoring: 0.50
    outreach:  0.20

sources:
  hn_who_is_hiring:
    enabled: true
    months_back: 1
